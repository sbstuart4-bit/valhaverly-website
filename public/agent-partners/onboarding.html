<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0;url=/agent-partners/apply" />
  <title>Partner Onboarding · Valhaverly</title>
  <script src="/partner-auth.js?v=1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var session = await PartnerAuth.getSession();
      if (session.authenticated) {
        PartnerAuth.redirectByStatus(session.session.status);
        return;
      }
      window.location.replace('/agent-partners/apply');
    });
  </script>
</head>
<body></body>
</html>
